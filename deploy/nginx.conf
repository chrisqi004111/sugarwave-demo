# Nginx config for the China/HK single-origin Lighthouse deployment.
# One origin (scene.example.com) serves BOTH the static frontend and /api/*:
#   /api/*  -> reverse-proxied to the Express backend on 127.0.0.1:3000
#   /*      -> static files from the built dist/, with SPA fallback to index.html
# Same-origin => no CORS needed. Replace scene.example.com + the dist path before use.

server {
    listen 443 ssl http2;
    server_name scene.example.com;

    # TLS (issue with: certbot --nginx -d scene.example.com)
    ssl_certificate     /etc/letsencrypt/live/scene.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scene.example.com/privkey.pem;

    root /var/www/scene/dist;
    index index.html;

    # ── API -> Express (matched before the SPA fallback) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # base64 images in /api/clean and /api/render (keep in sync with
        # express.json({ limit }) in server/index.js).
        client_max_body_size 25m;

        # a render (gpt-image-2) can take ~60s; the Lighthouse box has no
        # Vercel-style function cap, so allow generous time.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Hashed build assets: long-lived immutable cache ──
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA: serve static files, fall back to index.html for client routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name scene.example.com;
    return 301 https://$host$request_uri;
}
